---
# Full provisioning and application deploy. Run from this directory:
#   ansible-galaxy collection install -r requirements.yml
#   ansible-playbook site.yml
#
# Prerequisites: SSH key at ../secrets/deploy_key (chmod 600), not committed to git.

- name: Install Docker Engine (Debian family)
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Install Docker apt prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true
      when: ansible_facts["os_family"] == "Debian"

    - name: Ensure apt keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"
      when: ansible_facts["os_family"] == "Debian"

    - name: Download Docker apt GPG key
      ansible.builtin.get_url:
        url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: true
      when: ansible_facts["os_family"] == "Debian"

    - name: Configure Docker apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/{{ ansible_distribution | lower }}
          {{ ansible_distribution_release }} stable
        filename: docker
        state: present
      when: ansible_facts["os_family"] == "Debian"

    - name: Install Docker packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true
      when: ansible_facts["os_family"] == "Debian"

    - name: Ensure docker group exists
      ansible.builtin.group:
        name: docker
        state: present

    - name: Add deploy user to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Verify Docker daemon responds
      ansible.builtin.command:
        argv: [docker, info]
      changed_when: false

- name: Deploy MiniTasks application
  hosts: all
  become: false
  tasks:
    - name: Ensure application directory exists
      ansible.builtin.file:
        path: "{{ app_root }}"
        state: directory
        mode: "0755"

    - name: Rsync project to server
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../../"
        dest: "{{ app_root }}/"
        delete: false
        checksum: true
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=node_modules"
          - "--exclude=frontend/node_modules"
          - "--exclude=backend/node_modules"
          - "--exclude=frontend/dist"
          - "--exclude=database/*.sqlite"
          - "--exclude=database/*.sqlite-journal"
          - "--exclude=database/*.sqlite-wal"
          - "--exclude=database/*.sqlite-shm"
          - "--exclude=deploy/secrets"
          - "--exclude=.env"
          - "--exclude=**/.env"

- name: Build and start containers
  hosts: all
  become: true
  tasks:
    - name: Run docker compose
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - -f
          - "{{ app_root }}/docker-compose.yml"
          - up
          - -d
          - --build
        chdir: "{{ app_root }}"
      register: compose_up
      changed_when: "'Creating' in compose_up.stderr or 'Recreating' in compose_up.stderr or 'Starting' in compose_up.stderr or 'Built' in compose_up.stderr or 'Building' in compose_up.stderr"
