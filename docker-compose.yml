services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    volumes:
      - sqlite_data:/data
    environment:
      PORT: "4000"
      DB_FILE: /data/minitasks.sqlite

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  sqlite_data:
  caddy_data:
  caddy_config:
